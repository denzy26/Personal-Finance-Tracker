<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="logooo.png">
  <title>Dashboard</title>
</head>
<body>

  <nav>
    <img src="logo.png" alt="PFT Logo" class="logo">
    <div class="nav-links">
      <a href="home.html">HOME</a>
      <a href="about.html">ABOUT OUR APP</a>
      <a href="menu.html">MENU</a>
    </div>
  </nav>

  <main class="about-main">
    <a href="home.html" class="back-link">← Back</a>
    <h2 class="page-title">DASHBOARD</h2>

    <div class="dash-cards">
      <div class="dash-card">
        <h3>Current Balance</h3>
        <p id="balance">₱ 0.00</p>
      </div>
      <div class="dash-card income-card">
        <h3>Total Income</h3>
        <p id="income">₱ 0.00</p>
      </div>
      <div class="dash-card expense-card">
        <h3>Total Expense</h3>
        <p id="expense">₱ 0.00</p>
      </div>
    </div>

    <div class="about-section">
      <h3 class="section-heading">Recent Transactions</h3>
      <table class="txn-table">
        <thead>
          <tr>
            <th>Date</th>
            <th>Type</th>
            <th>Category</th>
            <th>Description</th>
            <th>Amount</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody id="transactionTable">
          <tr id="empty-row">
            <td colspan="6" style="text-align:center; color:#888; padding:20px;">No transactions yet.</td>
          </tr>
        </tbody>
      </table>
    </div>
  </main>

  <script src="app.js"></script>
</body>
</html>
